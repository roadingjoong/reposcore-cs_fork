name: Docs Validation

on:
  pull_request:
    paths:
      - "docs/**"
      - "tools/update-readme.py"
      - "tools/update-synopsis.py"
      - "Program.cs"
      - "reposcore-cs.csproj"
      - "Makefile"

jobs:
  verify-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Run documentation generation
        run: python3 tools/update-readme.py && python3 tools/update-synopsis.py

      - name: Verify no changes in README files
        run: |
          if ! git diff --exit-code; then
            echo "::error::README files are out of sync. Please run 'make' locally and commit the changes."
            exit 1
          fi